<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Sleepy Tabs (dev harness)</title>
		<script>
			// Minimal chrome.* stub so webextension-polyfill loads outside Firefox.
			const data = {};
			globalThis.chrome = {
				runtime: { id: 'dev-harness' },
				storage: {
					local: {
						get: (key, cb) => cb({ [key]: data[key] }),
						set: (obj, cb) => {
							Object.assign(data, obj);
							cb();
						},
					},
					onChanged: {
						addListener() {},
						removeListener() {},
					},
				},
			};
		</script>
	</head>
	<body>
		<div id="app" class="grid gap-8 bg-body-100 w-85 p-4 dark:bg-body-50"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
