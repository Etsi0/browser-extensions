<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Site Rule — Sleepy Tabs</title>
</head>
<body class="grid gap-4 bg-body-100 w-85 p-4 dark:bg-body-50">
	<div class="grid gap-2">
		<h2 class="flex items-center gap-1 min-w-0 text-custom-xl ml-[calc(var(--radius-outer)/2-.125em)]">
			<a href="./index.html" class="shrink-0 hover:text-text-700">
				<img
					src="../../materialDesignIcons/rounded/arrow_back_ios_new.svg"
					alt=""
					width="20"
					height="20"
					class="size-7 opacity-75 dark:invert"
				>
			</a>
			<span id="site-heading" class="truncate">New site rule</span>
		</h2>
		<form id="site-form" class="grid gap-2">
			<div class="menu-list">
				<label class="menu-row menu-row--setting">
					Site:
					<input
						class="grow bg-[color-mix(white_90%,var(--color-body-50))] px-2 py-1 rounded-(--radius-controls) font-mono text-sm dark:bg-body-200"
						type="text"
						name="pattern"
						placeholder="example.com"
						spellcheck="false"
						autocapitalize="off"
						autocomplete="off">
				</label>
				<label class="menu-row menu-row--setting">
					Unload:
					<select class="bg-[color-mix(white_90%,var(--color-body-50))] px-2 py-1 rounded-(--radius-controls) dark:bg-body-200" name="duration">
						<option value="1">After 1min</option>
						<option value="5">After 5min</option>
						<option value="10">After 10min</option>
						<option value="15">After 15min</option>
						<option value="30">After 30min</option>
						<option value="45">After 45min</option>
						<option value="60">After 60min</option>
						<option value="90">After 90min</option>
						<option value="120">After 120min</option>
						<option value="180">After 180min</option>
						<option value="240">After 240min</option>
						<option value="never">Never</option>
					</select>
				</label>
			</div>
			<button
				name="delete"
				type="button"
				class="
					bg-body-50 px-[1.5em] py-[.75em] rounded-(--radius-outer) cursor-pointer
					hover:bg-[oklch(.58_.2_30)] hover:text-[oklch(.97_.01_30)]
					not-hover:dark:bg-body-100
				"
				hidden
			>
				Delete
			</button>
		</form>
		<span class="text-text-500 text-sm">
			Override the global timeout per site. More specific patterns win, so
			<code>youtube.com/watch?v=</code> overrides <code>youtube.com</code>.
			Matches host, path, and query string (subdomains and ports included); use <code>*</code> as a wildcard.
		</span>
	</div>

	<script type="module" src="./site.ts"></script>
</body>
</html>
