<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>History Filter</title>
</head>
<body class="bg-body-100 p-4">
	<h2 class="font-semibold text-custom-xl">Global Settings</h2>
	<div id="global-container"></div>

	<h2 class="font-semibold text-custom-xl">Domain Filters</h2>
	<div id="domain-container"></div>

	<button name="add" class="w-full bg-body-200 px-[1.5em] py-[0.75em] rounded-lg cursor-pointer hover:bg-primary-500 hover:[color-mix(in_oklab,primary-500,white_10%)]">Add New Rule</button>

	<template>
		<div class="grid gap-2 bg-body-50 min-w-80 p-4 not-first:border-t not-first:border-t-body-100 first:rounded-t-lg last:rounded-b-lg last:mb-2 dark:bg-body-200 dark:not-first:border-t-body-300">
			<label class="flex">
				Domain:&nbsp;
				<input class="flex-1" type="text" name="domain" placeholder="example.com">
			</label>
			<label class="switch flex justify-between">
				Remove History:
				<input type="checkbox" name="removeHistory" checked>
				<span></span>
			</label>
			<label class="switch flex justify-between">
				Remove Cookies:
				<input type="checkbox" name="removeCookies">
				<span></span>
			</label>
			<label class="switch flex justify-between">
				Remove Storage:
				<input type="checkbox" name="removeStorage">
				<span></span>
			</label>
			<label class="switch flex justify-between">
				Remove Cache:
				<input type="checkbox" name="removeCache">
				<span></span>
			</label>
		</div>
	</template>

	<script type="module" src="./app.ts"></script>
</body>
</html>
